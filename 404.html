<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — DólarCTD</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <!-- Fuentes & Íconos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- CSS global -->
    <link rel="stylesheet" href="/css/style.css">
    
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
            padding: 2rem;
            animation: fadeIn 1s ease-in-out;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px var(--primary-glow);
            animation: pulse 3s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .error-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text);
        }
        
        .error-description {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 500px;
            margin-bottom: 2.5rem;
        }
        
        .error-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn-primary {
            background-color: var(--primary);
            color: #fff;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }
        
        .btn-primary:hover {
            background-color: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--primary-glow);
        }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--primary);
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            border: 2px solid var(--primary);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
        }
        
        .btn-secondary:hover {
            background-color: rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="animated-bg"></div>

    <!-- ══ HEADER ══ -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="header-logo" style="text-decoration:none">
                    <div>
                        <div class="header-title">Dólar<span>CTD</span></div>
                        <p class="header-subtitle">Cotizaciones en tiempo real</p>
                    </div>
                </a>
                <nav class="header-links">
                    <a href="/" class="dev-link"><i class="fas fa-home"></i> Inicio</a>
                    <a href="/estados-apis.html" class="dev-link"><i class="fas fa-circle-nodes"></i> APIs</a>
                    <a href="https://github.com/FabriCTD/DolarCTD" class="dev-link" target="_blank" rel="noopener"><i class="fab fa-github"></i> GitHub</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="container">
        <section class="error-container">
            <div class="error-code">404</div>
            <h1 class="error-title">Página no encontrada</h1>
            <p class="error-description">
                Uy, parece que te perdiste. La página que estás buscando no existe, fue movida o cambió de nombre.
            </p>
            <div class="error-actions">
                <a href="/" class="btn-primary">
                    <i class="fas fa-home"></i> Volver al Inicio
                </a>
                <a href="/ar/contacto.html" class="btn-secondary">
                    <i class="fas fa-envelope"></i> Contacto
                </a>
            </div>
        </section>

        <!-- ══ FOOTER ══ -->
        <footer class="footer">
            <div class="footer-bottom" style="border-top:1px solid var(--border-card);padding-top:1.25rem;margin-top:2rem">
                <p>&copy; 2025 DólarCTD · Desarrollado por <a href="https://github.com/FabriCTD" target="_blank" rel="noopener">FabriCTD</a></p>
                <p><a href="/">Inicio</a> · <a href="/estados-apis.html">Estado APIs</a></p>
            </div>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
